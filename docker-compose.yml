services:
  postgres:
    image: postgres:18-alpine
    container_name: meads-postgres
    environment:
      POSTGRES_DB: meads
      POSTGRES_USER: meads
      POSTGRES_PASSWORD: meads
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: meads-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
