<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}">Email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f4f4;">
        <tr>
            <td align="center" style="padding: 40px 0;">
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #1a1a2e; padding: 24px 40px; text-align: center;">
                            <img src="cid:meads-logo" alt="MEADS" style="height: 48px; width: auto;" />
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding: 40px;">
                            <h2 style="margin: 0 0 16px 0; color: #1a1a2e; font-size: 20px;" th:text="${heading}">Heading</h2>
                            <p th:style="${bodyText2 != null} ? 'margin: 0 0 16px 0; color: #333333; font-size: 16px; line-height: 1.5;' : 'margin: 0 0 32px 0; color: #333333; font-size: 16px; line-height: 1.5;'" th:text="${bodyText}">Body text</p>
                            <p th:if="${bodyText2 != null}" style="margin: 0 0 32px 0; color: #333333; font-size: 16px; line-height: 1.5;" th:text="${bodyText2}">Body text 2</p>
                            <!-- Order review details -->
                            <div th:if="${orderReviewCompetition != null}" style="margin: 0 0 32px 0; color: #555555; font-size: 14px; line-height: 1.6; padding: 16px; background-color: #f8f8f8; border-radius: 6px;">
                                <strong>Competition:</strong> <span th:text="${orderReviewCompetition}">Competition</span><br/>
                                <strong>Affected division(s):</strong> <span th:text="${orderReviewDivisions}">Divisions</span>
                            </div>
                            <!-- Entry summary list -->
                            <div th:if="${entryLines != null}" style="margin: 0 0 32px 0; color: #555555; font-size: 14px; line-height: 1.6; padding: 16px; background-color: #f8f8f8; border-radius: 6px;">
                                <span th:each="line : ${entryLines}" th:text="${line}" style="display: block;">Entry line</span>
                            </div>
                            <!-- CTA Button -->
                            <table th:if="${ctaUrl != null}" role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">
                                <tr>
                                    <td style="border-radius: 6px; background-color: #1a1a2e;">
                                        <a th:href="${ctaUrl}" th:text="${ctaLabel}" style="display: inline-block; padding: 14px 32px; color: #ffffff; text-decoration: none; font-size: 16px; font-weight: bold;">Button</a>
                                    </td>
                                </tr>
                            </table>
                            <!-- Fallback URL -->
                            <p th:if="${ctaUrl != null}" style="margin: 32px 0 0 0; color: #888888; font-size: 12px; line-height: 1.4;">
                                <span th:text="${fallbackText != null} ? ${fallbackText} : 'If the button doesn\'t work, copy and paste this link into your browser:'">If the button doesn't work, copy and paste this link into your browser:</span><br/>
                                <a th:href="${ctaUrl}" th:text="${ctaUrl}" style="color: #1a1a2e; word-break: break-all;">https://example.com</a>
                            </p>
                        </td>
                    </tr>
                    <!-- Contact footer (conditional) -->
                    <tr th:if="${contactEmail != null}">
                        <td style="padding: 0 40px 24px 40px; border-top: 1px solid #eeeeee;">
                            <p style="margin: 24px 0 0 0; color: #666666; font-size: 14px;">
                                <span th:text="${contactText != null} ? ${contactText} : 'Questions? Contact'">Questions? Contact</span>
                                <a th:href="'mailto:' + ${contactEmail}" th:text="${contactEmail}" style="color: #1a1a2e;">organizer@example.com</a>
                            </p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8f8f8; padding: 20px 40px; text-align: center; border-top: 1px solid #eeeeee;">
                            <p style="margin: 0; color: #999999; font-size: 12px;">
                                <span th:text="${footerText != null} ? ${footerText} : 'MEADS — Mead Evaluation and Awards Data System'">MEADS — Mead Evaluation and Awards Data System</span>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
